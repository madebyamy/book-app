<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Brain · Your Personal Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Jost:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Spectral:ital,wght@0,400;0,500;1,400;1,500&family=Special+Elite&display=swap" rel="stylesheet" />
    <style>
      *,*::before,*::after{box-sizing:border-box}
      html,body{margin:0;padding:0;scroll-behavior:smooth}
      body{
        background:#F2EFEB;
        color:#262020;
        font-family:'Jost',system-ui,-apple-system,sans-serif;
        -webkit-font-smoothing:antialiased;
        text-rendering:optimizeLegibility;
      }
      ::selection{background:#F25C5C;color:#fff}
      img{max-width:100%;display:block}
      button{font-family:inherit}
      @keyframes mg-marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
      @keyframes mg-fadein{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
      @keyframes cc-pop{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:none}}
      @keyframes cc-tray{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
      @keyframes drawer-pull{0%{transform:translateY(0);box-shadow:0 2px 4px rgba(0,0,0,.3)}40%{transform:translateY(8px);box-shadow:inset 0 6px 10px rgba(0,0,0,.5)}100%{transform:translateY(3px);box-shadow:inset 0 3px 6px rgba(0,0,0,.35),0 1px 2px rgba(0,0,0,.3)}}
      @keyframes card-fly{0%{opacity:0;transform:translateY(-110px) rotate(-10deg) scale(0.8)}65%{opacity:1;transform:translateY(10px) rotate(1.5deg) scale(1.03)}85%{transform:translateY(-3px) rotate(-0.5deg) scale(0.99)}100%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}}
      @keyframes card-shuffle{0%{opacity:0;transform:translateY(60px) rotate(4deg) scale(0.88)}50%{opacity:1;transform:translateY(-8px) rotate(-1deg) scale(1.02)}75%{transform:translateY(4px) rotate(0.5deg)}100%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}}
      @keyframes drawer-open-tray{0%{opacity:0;transform:translateY(-14px) scaleY(0.94)}100%{opacity:1;transform:none}}
      @keyframes cc-fade{from{opacity:0}to{opacity:1}}
      @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
      @keyframes drawer-slide-up{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
      @keyframes cc-fade-in{from{opacity:0}to{opacity:1}}
      .shake{animation:shake .4s ease}
      @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
